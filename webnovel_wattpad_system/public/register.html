<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelVerse Register</title>
<link rel="stylesheet" href="css/register.css">

</head>
<body>

<div class="container">

    <div class="card">

        <img src="images/26.jpg" class="logo" alt="Avatar">

        <h2>Create Account</h2>

        <p class="subtitle">
            Join NovelVerse and start your legendary journey
        </p>

        <input id="u" type="text" placeholder="Username">

        <input id="p" type="password" placeholder="Password">

        <button class="btn" onclick="reg()">
            Register
        </button>

        <p class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</div>

<script src="js/register.js"></script>

</body>
</html>
